set timeout=5
set default=0

# Load the background image
insmod all_video
insmod vbe
insmod gfxterm
insmod png
insmod jpeg
insmod keylayouts

loadkeys de

set gfxmode=2560x1440
set gfxpayload=keep

serial --unit=0 --speed=9600 --word=8 --parity=no --stop=1
terminal_input console serial
terminal_output gfxterm serial

#background_image /boot/grub/background.png

set theme=/boot/grub/themes/CyberEXS/theme.txt

menuentry "Hello GRUB ISO" --class=gnu-linux {
    echo "Default GNU/Linux icon"
    sleep 3
}

menuentry "Ubuntu Test Entry" --class=ubuntu --class=gnu-linux {
    echo "Testing Ubuntu icon"
    sleep 3
}

menuentry "Arch Linux Test" --class=archlinux --class=gnu-linux {
    echo "Testing Arch icon"
    sleep 3
}

menuentry "Fedora Test" --class=fedora --class=gnu-linux {
    echo "Testing Fedora icon"
    sleep 3
}

menuentry "Debian Test" --class=debian --class=gnu-linux {
    echo "Testing Debian icon"
    sleep 3
}